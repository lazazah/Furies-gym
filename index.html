<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Furies Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--card:#1c1c1c;--border:#2a2a2a;--accent:#e63b2e;--accent2:#ff6b35;--gold:#c9a84c;--home:#4a90d9;--home2:#7bb8f0;--warm:#9b59b6;--warm2:#c39bd3;--text:#f0ece4;--muted:#7a7570;--success:#4caf50;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:100px}
header{background:linear-gradient(180deg,#1a0a08 0%,var(--bg) 100%);padding:16px 16px 12px;border-bottom:1px solid #2a1510;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px rgba(230,59,46,0.4)}
.week-badge{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;color:var(--gold);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);padding:4px 10px;border-radius:20px}
.mode-tabs{display:flex;gap:6px;margin-bottom:10px}
.mode-tab{flex:1;padding:8px 4px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;text-align:center;transition:all 0.2s;border:1px solid var(--border);color:var(--muted);background:var(--card)}
.mode-tab.active-salle{background:var(--accent);border-color:var(--accent);color:white;box-shadow:0 0 12px rgba(230,59,46,0.35)}
.mode-tab.active-maison{background:var(--home);border-color:var(--home);color:white;box-shadow:0 0 12px rgba(74,144,217,0.35)}
.session-tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{flex:1;min-width:0;padding:7px 4px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.2s;white-space:nowrap}
.tab.active-salle{background:var(--accent);border-color:var(--accent);color:white}
.tab.active-maison{background:var(--home);border-color:var(--home);color:white}
.tab.active-warm{background:var(--warm);border-color:var(--warm);color:white}
.day-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-align:center;margin-top:5px}
/* Warm up */
.warm-block{margin:12px 16px 0;background:linear-gradient(135deg,#130a1a,#1a1024);border:1px solid rgba(155,89,182,0.25);border-radius:var(--radius);padding:14px 16px}
.warm-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--warm2);text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.warm-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(155,89,182,0.15)}
.warm-step:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.warm-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--warm);line-height:1;min-width:22px}
.warm-info{flex:1}
.warm-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
.warm-detail{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.warm-detail span{color:var(--warm2);font-weight:600}
.btn-warm-timer{width:100%;margin-top:12px;padding:9px;background:rgba(155,89,182,0.15);border:1px solid rgba(155,89,182,0.4);border-radius:8px;color:var(--warm2);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer}
/* Cardio */
.cardio-block{margin:12px 16px 0;border-radius:var(--radius);padding:12px 14px}
.cardio-salle{background:linear-gradient(135deg,#1a1208,#1c1410);border:1px solid rgba(201,168,76,0.2)}
.cardio-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.section-label-gold{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;line-height:1;color:var(--gold)}
.cardio-protocol{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.cardio-protocol span{font-weight:500;color:var(--text)}
.btn-timer{width:100%;padding:9px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);color:var(--gold)}
.btn-timer.running{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,59,46,0.3)}50%{box-shadow:0 0 0 6px rgba(230,59,46,0)}}
/* Notice */
.notice{margin:10px 16px 0;background:rgba(74,144,217,0.08);border:1px solid rgba(74,144,217,0.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--home2);line-height:1.6}
.notice strong{display:block;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;font-size:11px;margin-bottom:4px;color:var(--home)}
/* Week nav */
.week-nav{display:flex;align-items:center;gap:10px;padding:12px 16px 0}
.week-nav button{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-label{flex:1;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;color:var(--text);text-transform:uppercase}
/* Progress */
.progress-wrap{padding:10px 16px 0}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:5px;font-family:'Barlow Condensed',sans-serif}
/* Exercise cards */
.exercises-container{padding:12px 16px}
.material-separator{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase;padding:8px 2px 4px;border-top:1px solid var(--border);margin-top:4px}
.material-separator:first-child{border-top:none;padding-top:0}
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color 0.2s}
.exercise-card.completed-salle{border-color:rgba(76,175,80,0.4)}
.exercise-card.completed-maison{border-color:rgba(74,144,217,0.4)}
.exercise-header{display:flex;align-items:center;padding:11px 13px;cursor:pointer;gap:11px}
.ex-number-salle{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);min-width:22px;line-height:1}
.ex-number-maison{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--home);min-width:22px;line-height:1}
.ex-info{flex:1}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
.ex-target{font-size:12px;color:var(--muted);margin-top:2px}
.ex-target-salle span{color:var(--accent2);font-weight:600}
.ex-target-maison span{color:var(--home2);font-weight:600}
.ex-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;transition:all 0.2s;cursor:pointer;flex-shrink:0}
.ex-check.done{background:var(--success);border-color:var(--success);color:white}
.sets-container{border-top:1px solid var(--border);padding:0 13px 11px;display:none}
.sets-container.open{display:block}
.ex-illustration{background:#111;border-bottom:1px solid var(--border);padding:12px;display:flex;align-items:flex-start;gap:10px}
.ex-desc{font-size:12px;color:var(--muted);line-height:1.6}
.ex-desc strong{color:var(--accent2);display:block;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;margin-bottom:4px}
.ex-desc strong.blue{color:var(--home2)}
.muscles-tag{display:inline-block;margin-top:6px;font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;color:var(--gold);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);padding:2px 8px;border-radius:10px}
.illus-toggle{display:block;width:calc(100% - 26px);margin:7px 13px 0;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:20px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;padding:5px 0;cursor:pointer;text-align:center}
.sets-header{display:grid;grid-template-columns:32px 1fr 1fr 40px;gap:7px;padding:8px 0 5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 40px;gap:7px;margin-bottom:6px;align-items:center}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--muted);text-align:center}
.set-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;font-weight:500;text-align:center;width:100%;-webkit-appearance:none}
.set-input:focus{outline:none;border-color:var(--accent);background:#1f1410}
.set-input::placeholder{color:var(--muted);font-size:12px}
.set-done-btn{width:34px;height:34px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.set-done-btn.done{background:rgba(76,175,80,0.15);border-color:var(--success);color:var(--success)}
.prev-badge{font-size:10px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-align:center;padding:3px 0 5px;opacity:0.8}
.rest-hint{font-size:11px;color:var(--muted);text-align:center;padding:5px 0 2px;letter-spacing:1px}
/* Rest timer */
.rest-timer-bar{display:flex;align-items:center;gap:9px;background:rgba(230,59,46,0.08);border:1px solid rgba(230,59,46,0.25);border-radius:8px;padding:9px 12px;margin:5px 0}
.rest-timer-bar.done{background:rgba(76,175,80,0.1);border-color:rgba(76,175,80,0.4)}
.rest-count{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent);min-width:42px;line-height:1}
.rest-count.done{color:var(--success)}
.rest-progress{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.rest-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.9s linear}
.rest-fill.done{background:var(--success)}
.rest-btns{display:flex;gap:5px}
.rest-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 8px;cursor:pointer;white-space:nowrap}
.rest-btn.primary{background:rgba(230,59,46,0.15);border-color:var(--accent);color:var(--accent)}
/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(0deg,#0f0f0f 60%,transparent);padding:10px 16px 26px;display:flex;gap:10px}
.btn-save-salle{flex:1;padding:13px;background:var(--accent);border:none;border-radius:10px;color:white;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;cursor:pointer;box-shadow:0 4px 20px rgba(230,59,46,0.4)}
.btn-save-maison{flex:1;padding:13px;background:var(--home);border:none;border-radius:10px;color:white;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;cursor:pointer;box-shadow:0 4px 20px rgba(74,144,217,0.3)}
.btn-history{padding:13px 15px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:19px;cursor:pointer}
/* History */
.history-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;backdrop-filter:blur(4px)}
.history-panel.open{display:flex;align-items:flex-end}
.history-sheet{background:#111;border-top:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:75vh;overflow-y:auto;padding:20px 16px 40px}
.history-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.close-btn{font-size:20px;color:var(--muted);cursor:pointer}
.history-entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:9px}
.history-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);margin-bottom:7px;text-transform:uppercase}
.history-row{font-size:13px;color:var(--muted);margin-bottom:3px;line-height:1.4}
.history-row strong{color:var(--text)}
.empty-history{text-align:center;color:var(--muted);font-size:14px;padding:30px 0}
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--success);color:white;padding:9px 18px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="app-title">FURIES GYM</div>
    <div class="week-badge" id="weekBadge">SEMAINE 1</div>
  </div>
  <div class="mode-tabs">
    <div class="mode-tab active-salle" id="modeTabSalle" onclick="setMode('salle')">💪 SALLE</div>
    <div class="mode-tab" id="modeTabMaison" onclick="setMode('maison')">🏠 MAISON</div>
  </div>
  <div class="session-tabs" id="sessionTabs"></div>
  <div class="day-label" id="dayLabel"></div>
</header>

<div class="week-nav">
  <button onclick="changeWeek(-1)">&#8249;</button>
  <div class="week-label" id="weekLabel">Semaine 1</div>
  <button onclick="changeWeek(1)">&#8250;</button>
</div>
<div id="progressWrap" style="padding:10px 16px 0">
  <div class="progress-bar"><div id="progressFill" style="width:0%;height:100%;border-radius:3px;transition:width 0.4s ease;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0 séries complétées</div>
</div>
<div id="warmContainer"></div>
<div id="cardioBlock"></div>
<div id="noticeBlock"></div>
<div class="exercises-container" id="exercisesContainer"></div>

<div class="bottom-bar">
  <button class="btn-history" onclick="openHistory()">📋</button>
  <button id="btnSave" class="btn-save-salle" onclick="saveSession()">SAUVEGARDER</button>
</div>
<div class="history-panel" id="historyPanel">
  <div class="history-sheet">
    <div class="history-title">HISTORIQUE <span class="close-btn" onclick="closeHistory()">✕</span></div>
    <div id="historyContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

// ─── ILLUSTRATIONS ────────────────────────────────────────────────────────────
const IL = {

function getPrevValues(ei,sets){
  if(week<=1)return null;
  try{
    const prev=JSON.parse(localStorage.getItem(gk(week-1,mode,cur))||'{}');
    const vals=[];let has=false;
    for(let s=0;s<sets;s++){const d=prev[`${ei}_${s}`]||{};vals.push({weight:d.weight||'',reps:d.reps||''});if(d.weight||d.reps)has=true;}
    return has?vals:null;
  }catch(e){return null;}
}

// ─── REST TIMER ───────────────────────────────────────────────────────────────
function startRest(ei,s){
  const k=`${ei}_${s}`;stopRest(k);
  const duration = mode==='maison' ? 35 : 60;
  restTimers[k]={sec:duration,total:duration,interval:null};
  restTimers[k].interval=setInterval(()=>{
    restTimers[k].sec--;renderRestBar(ei,s);
    if(restTimers[k].sec<=0){stopRest(k);renderRestBar(ei,s);if(navigator.vibrate)navigator.vibrate([200,100,200]);}
  },1000);
  renderRestBar(ei,s);
}
function stopRest(k){if(restTimers[k]&&restTimers[k].interval){clearInterval(restTimers[k].interval);restTimers[k].interval=null;}}
function resetRest(ei,s){const k=`${ei}_${s}`;stopRest(k);delete restTimers[k];renderRestBar(ei,s);}
function addRest(ei,s,d){const k=`${ei}_${s}`;if(!restTimers[k])return;restTimers[k].sec=Math.max(0,restTimers[k].sec+d);restTimers[k].total=Math.max(restTimers[k].total,restTimers[k].sec);renderRestBar(ei,s);}
function renderRestBar(ei,s){
  const bar=document.getElementById(`rest-${ei}-${s}`);if(!bar)return;
  const k=`${ei}_${s}`,rt=restTimers[k];
  if(!rt){bar.style.display='none';return;}
  const done=rt.sec<=0,pct=done?100:Math.round((1-rt.sec/rt.total)*100);
  bar.style.display='flex';bar.className='rest-timer-bar'+(done?' done':'');
  bar.innerHTML=`<div class="rest-count${done?' done':''}">${done?'GO':fmt(rt.sec)}</div>
  <div class="rest-progress"><div class="rest-fill${done?' done':''}" style="width:${pct}%"></div></div>
  <div class="rest-btns">${!done?`<button class="rest-btn" onclick="addRest(${ei},${s},-15)">-15s</button><button class="rest-btn" onclick="addRest(${ei},${s},15)">+15s</button>`:''}<button class="rest-btn${done?'':' primary'}" onclick="${done?`resetRest(${ei},${s})`:`startRest(${ei},${s})`}">${done?'↺':'⏸'}</button></div>`;
}

function buildCard(ex,ei){

    prevHint=`<div class="prev-badge">📈 Sem. ${week-1} : ${sm}</div>`;
  }
  card.innerHTML=`
    <div class="exercise-header" onclick="togSets(${ei})">

      <div class="ex-check${done?' done':''}" id="chk-${ei}" onclick="event.stopPropagation();markAll(${ei},${ex.sets})">${done?'✓':''}</div>
    </div>

        <div>SÉR.</div>${mode==='maison'?'':'<div>POIDS</div>'}<div>REPS</div><div></div>
      </div>
      ${buildRows(ei,ex.sets,prev)}
      ${prevHint}
      <div class="rest-hint">⏱ Coche ✓ pour lancer le minuteur de récup (${mode==='maison'?'35':'60'} sec)</div>
    </div>`;
  return card;
}

function buildRows(ei,n,prev){
  const isMaison=mode==='maison';
  let h='';
  for(let s=0;s<n;s++){
    const d=sd[`${ei}_${s}`]||{};
    const w=d.weight!==undefined?d.weight:(prev&&prev[s]?prev[s].weight:'');
    const r=d.reps!==undefined?d.reps:(prev&&prev[s]?prev[s].reps:'');
    if(isMaison){
      h+=`<div class="set-row" style="grid-template-columns:32px 1fr 40px">
        <div class="set-num">${s+1}</div>
        <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${r}" onchange="sf(${ei},${s},'reps',this.value)">
        <button class="set-done-btn${d.done?' done':''}" id="sb-${ei}-${s}" onclick="tsd(${ei},${s})">${d.done?'✓':'○'}</button>
      </div><div id="rest-${ei}-${s}" style="display:none;flex-direction:row"></div>`;
    } else {
      h+=`<div class="set-row">
        <div class="set-num">${s+1}</div>
        <input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${w}" onchange="sf(${ei},${s},'weight',this.value)">
        <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${r}" onchange="sf(${ei},${s},'reps',this.value)">
        <button class="set-done-btn${d.done?' done':''}" id="sb-${ei}-${s}" onclick="tsd(${ei},${s})">${d.done?'✓':'○'}</button>
      </div><div id="rest-${ei}-${s}" style="display:none;flex-direction:row"></div>`;
    }
  }
  return h;
}

function togSets(ei){document.getElementById(`sc-${ei}`).classList.toggle('open');}
function togIl(ei){
  const el=document.getElementById(`il-${ei}`),btn=document.getElementById(`ib-${ei}`);
  const show=el.style.display==='none';el.style.display=show?'flex':'none';
  btn.textContent=show?'✕ MASQUER':'👁 VOIR LE MOUVEMENT';
}
function sf(ei,s,f,v){const k=`${ei}_${s}`;if(!sd[k])sd[k]={};sd[k][f]=v;sv();}

function tsd(ei,s){
  const k=`${ei}_${s}`;if(!sd[k])sd[k]={};
  sd[k].done=!sd[k].done;sv();
  const btn=document.getElementById(`sb-${ei}-${s}`);
  btn.classList.toggle('done',sd[k].done);btn.textContent=sd[k].done?'✓':'○';
  if(sd[k].done)startRest(ei,s);else resetRest(ei,s);
  const sesObj=mode==='salle'?SESSIONS.salle[cur]:SESSIONS.maison[cur];
  let gi=0,found=null;
  sesObj.groups.forEach(grp=>grp.exercises.forEach(ex=>{if(gi===ei)found=ex;gi++;}));
  if(found){
    const all=isDone(ei,found.sets);
    document.getElementById(`ex-${ei}`).className=`exercise-card${all?(' completed-'+mode):''}`;
    const ch=document.getElementById(`chk-${ei}`);ch.classList.toggle('done',all);ch.textContent=all?'✓':'';
  }
  prog();
}

function markAll(ei,n){
  const was=(sd[`${ei}_0`]||{}).done;
  for(let s=0;s<n;s++){
    const k=`${ei}_${s}`;if(!sd[k])sd[k]={};sd[k].done=!was;
    const b=document.getElementById(`sb-${ei}-${s}`);
    if(b){b.classList.toggle('done',!was);b.textContent=!was?'✓':'○';}
    if(!was)startRest(ei,s);else resetRest(ei,s);
  }
  sv();
  document.getElementById(`ex-${ei}`).className=`exercise-card${!was?(' completed-'+mode):''}`;
  const ch=document.getElementById(`chk-${ei}`);ch.classList.toggle('done',!was);ch.textContent=!was?'✓':'';
  prog();
}

function isDone(ei,n){for(let s=0;s<n;s++){if(!(sd[`${ei}_${s}`]||{}).done)return false;}return n>0;}

function prog(){
  const sesObj=mode==='salle'?SESSIONS.salle[cur]:SESSIONS.maison[cur];
  let tot=0,dn=0,gi=0;
  sesObj.groups.forEach(grp=>grp.exercises.forEach(ex=>{
    tot+=ex.sets;for(let s=0;s<ex.sets;s++){if((sd[`${gi}_${s}`]||{}).done)dn++;}gi++;
  }));
  const pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${dn} / ${tot} séries complétées`;
}

// ─── CARDIO TIMER ─────────────────────────────────────────────────────────────
function toggleTimer(){
  if(!tRun){
    tRun=true;
    const btn=document.getElementById('timerBtn');if(btn){btn.textContent='⏸ PAUSE';btn.classList.add('running');}
    tInt=setInterval(()=>{
      if(tSec>0){tSec--;const d=document.getElementById('timerDisplay');if(d)d.textContent=fmt(tSec);}
      else{clearInterval(tInt);tRun=false;const btn=document.getElementById('timerBtn');if(btn){btn.textContent='✓ TERMINÉ';btn.classList.remove('running');}}
    },1000);
  } else {
    clearInterval(tInt);tRun=false;
    const btn=document.getElementById('timerBtn');if(btn){btn.textContent='▶ REPRENDRE';btn.classList.remove('running');}
  }
}
function resetTimer(){
  clearInterval(tInt);tRun=false;tSec=1200;
  const d=document.getElementById('timerDisplay');if(d)d.textContent=fmt(tSec);
  const btn=document.getElementById('timerBtn');if(btn){btn.textContent='▶ DÉMARRER';btn.classList.remove('running');}
}

// ─── SAVE / HISTORY ───────────────────────────────────────────────────────────
function saveSession(){
  const ds=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  let h=[];try{h=JSON.parse(localStorage.getItem('fg_history3')||'[]');}catch(e){}
  const entries=[];
  const sesObj=mode==='salle'?SESSIONS.salle[cur]:SESSIONS.maison[cur];
  let gi=0;
  sesObj.groups.forEach(grp=>grp.exercises.forEach(ex=>{
    const ei=gi++;const sets=[];
    for(let s=0;s<ex.sets;s++){const d=sd[`${ei}_${s}`]||{};if(d.weight||d.reps)sets.push(`${d.weight||'?'}kg×${d.reps||'?'}`);}
    if(sets.length)entries.push({name:ex.name,sets});
  }));
  h.unshift({date:ds,session:cur,week,lieu:mode==='salle'?'💪 Salle':'🏠 Maison',data:entries});
  localStorage.setItem('fg_history3',JSON.stringify(h.slice(0,60)));
  showToast('✓ SÉANCE SAUVEGARDÉE');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function openHistory(){
  let h=[];try{h=JSON.parse(localStorage.getItem('fg_history3')||'[]');}catch(e){}
  document.getElementById('historyContent').innerHTML=h.length
    ?h.map(e=>`<div class="history-entry"><div class="history-date">${e.lieu} · Séance ${e.session} · Sem. ${e.week} · ${e.date}</div>${e.data.map(x=>`<div class="history-row"><strong>${x.name}</strong> : ${x.sets.join(' | ')}</div>`).join('')}</div>`).join('')
    :'<div class="empty-history">Aucune séance enregistrée encore.</div>';
  document.getElementById('historyPanel').classList.add('open');
}
function closeHistory(){document.getElementById('historyPanel').classList.remove('open');}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadPrefs();
renderAll();
</script>
