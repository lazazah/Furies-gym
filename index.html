<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Furies Gym">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<!-- Icône Apple (crée un fichier icon-192.png rouge/noir avec "FG" dedans) -->
<link rel="apple-touch-icon" href="icon-192.png">
<title>Furies Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --card: #1c1c1c; --border: #2a2a2a;
    --accent: #e63b2e; --accent2: #ff6b35; --gold: #c9a84c;
    --text: #f0ece4; --muted: #7a7570; --success: #4caf50; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 90px; }
  header { background: linear-gradient(180deg, #1a0a08 0%, var(--bg) 100%); padding: 20px 20px 16px; border-bottom: 1px solid #2a1510; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 20px rgba(230,59,46,0.4); }
  .week-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 2px; color: var(--gold); background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); padding: 4px 10px; border-radius: 20px; }
  .session-tabs { display: flex; gap: 8px; margin-top: 14px; }
  .tab { flex: 1; padding: 8px 4px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.2s; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 12px rgba(230,59,46,0.4); }
  .cardio-block { margin: 16px 16px 0; background: linear-gradient(135deg, #1a1208 0%, #1c1410 100%); border: 1px solid rgba(201,168,76,0.2); border-radius: var(--radius); padding: 14px 16px; }
  .cardio-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
  .timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: var(--gold); line-height: 1; }
  .cardio-protocol { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
  .cardio-protocol span { color: var(--text); font-weight: 500; }
  .btn-timer { width: 100%; padding: 10px; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); border-radius: 8px; color: var(--gold); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .btn-timer.running { background: rgba(230,59,46,0.2); border-color: var(--accent); color: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(230,59,46,0.3)} 50%{box-shadow:0 0 0 6px rgba(230,59,46,0)} }
  .exercises-container { padding: 12px 16px; }
  .exercise-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
  .exercise-card.completed { border-color: rgba(76,175,80,0.4); }
  .exercise-header { display: flex; align-items: center; padding: 12px 14px; cursor: pointer; gap: 12px; }
  .ex-number { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); min-width: 24px; line-height: 1; }
  .ex-info { flex: 1; }
  .ex-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); line-height: 1.2; }
  .ex-target { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .ex-target span { color: var(--accent2); font-weight: 600; }
  .ex-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; color: transparent; font-size: 14px; transition: all 0.2s; cursor: pointer; flex-shrink: 0; }
  .ex-check.done { background: var(--success); border-color: var(--success); color: white; }
  .sets-container { border-top: 1px solid var(--border); padding: 0 14px 12px; display: none; }
  .sets-container.open { display: block; }
  .ex-illustration { background: #111; border-bottom: 1px solid var(--border); padding: 14px 12px; display: flex; align-items: flex-start; gap: 12px; }
  .ex-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .ex-desc strong { color: var(--accent2); display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 1.5px; margin-bottom: 4px; }
  .muscles-tag { display: inline-block; margin-top: 7px; font-size: 10px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1.5px; color: var(--gold); background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); padding: 2px 8px; border-radius: 10px; }
  .illus-toggle { display: block; width: calc(100% - 28px); margin: 8px 14px 0; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.25); border-radius: 20px; color: var(--gold); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; padding: 5px 0; cursor: pointer; text-align: center; }
  .sets-header { display: grid; grid-template-columns: 36px 1fr 1fr 44px; gap: 8px; padding: 8px 0 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .set-row { display: grid; grid-template-columns: 36px 1fr 1fr 44px; gap: 8px; margin-bottom: 6px; align-items: center; }
  .set-num { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; color: var(--muted); text-align: center; }
  .set-input { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 500; text-align: center; width: 100%; -webkit-appearance: none; }
  .set-input:focus { outline: none; border-color: var(--accent); background: #1f1410; }
  .set-input::placeholder { color: var(--muted); font-size: 13px; }
  .set-done-btn { width: 36px; height: 36px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .set-done-btn.done { background: rgba(76,175,80,0.15); border-color: var(--success); color: var(--success); }
  .rest-hint { font-size: 11px; color: var(--muted); text-align: center; padding: 6px 0 2px; letter-spacing: 1px; }
  .week-nav { display: flex; align-items: center; gap: 10px; padding: 12px 16px 0; }
  .week-nav button { background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .week-label { flex: 1; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 2px; color: var(--text); text-transform: uppercase; }
  .progress-wrap { padding: 10px 16px 0; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 5px; font-family: 'Barlow Condensed', sans-serif; }
  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: linear-gradient(0deg, #0f0f0f 60%, transparent); padding: 12px 16px 28px; display: flex; gap: 10px; }
  .btn-save { flex: 1; padding: 14px; background: var(--accent); border: none; border-radius: 10px; color: white; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; cursor: pointer; box-shadow: 0 4px 20px rgba(230,59,46,0.4); transition: all 0.2s; }
  .btn-save:active { transform: scale(0.97); }
  .btn-history { padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 20px; cursor: pointer; }
  .history-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; backdrop-filter: blur(4px); }
  .history-panel.open { display: flex; align-items: flex-end; }
  .history-sheet { background: #111; border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-height: 75vh; overflow-y: auto; padding: 20px 16px 40px; }
  .history-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--accent); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .close-btn { font-size: 20px; color: var(--muted); cursor: pointer; font-family: sans-serif; }
  .history-entry { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
  .history-date { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; }
  .history-row { font-size: 13px; color: var(--muted); margin-bottom: 4px; line-height: 1.4; }
  .history-row strong { color: var(--text); }
  .empty-history { text-align: center; color: var(--muted); font-size: 14px; padding: 30px 0; }
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--success); color: white; padding: 10px 20px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 300; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="app-title">FURIES GYM</div>
    <div class="week-badge" id="weekBadge">SEMAINE 1</div>
  </div>
  <div class="session-tabs">
    <div class="tab active" onclick="setSession('A')">SÉANCE A</div>
    <div class="tab" onclick="setSession('B')">SÉANCE B</div>
    <div class="tab" onclick="setSession('C')">SÉANCE C</div>
  </div>
</header>
<div class="week-nav">
  <button onclick="changeWeek(-1)">‹</button>
  <div class="week-label" id="weekLabel">Semaine 1</div>
  <button onclick="changeWeek(1)">›</button>
</div>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0 séries complétées</div>
</div>
<div class="cardio-block">
  <div class="cardio-header">
    <div class="section-label">🔥 Cardio fractionné</div>
    <div class="timer-display" id="timerDisplay">20:00</div>
  </div>
  <div class="cardio-protocol">
    <span>5 min</span> échauffement marche (5–6 km/h) → <span>10 x</span> [30s sprint 9–11 km/h / 1min récup] → <span>2 min</span> retour au calme
  </div>
  <button class="btn-timer" id="timerBtn" onclick="toggleTimer()">▶ DÉMARRER</button>
</div>
<div class="exercises-container" id="exercisesContainer"></div>
<div class="bottom-bar">
  <button class="btn-history" onclick="openHistory()">📋</button>
  <button class="btn-save" onclick="saveSession()">SAUVEGARDER</button>
</div>
<div class="history-panel" id="historyPanel">
  <div class="history-sheet">
    <div class="history-title">HISTORIQUE <span class="close-btn" onclick="closeHistory()">✕</span></div>
    <div id="historyContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
