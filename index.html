<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Furies Gym">
<title>Furies Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--card:#1c1c1c;--border:#2a2a2a;--accent:#e63b2e;--accent2:#ff6b35;--gold:#c9a84c;--text:#f0ece4;--muted:#7a7570;--success:#4caf50;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:90px}
header{background:linear-gradient(180deg,#1a0a08 0%,var(--bg) 100%);padding:20px 20px 16px;border-bottom:1px solid #2a1510;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px rgba(230,59,46,0.4)}
.week-badge{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;color:var(--gold);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);padding:4px 10px;border-radius:20px}
.session-tabs{display:flex;gap:8px;margin-top:14px}
.tab{flex:1;padding:8px 4px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.2s}
.tab.active{background:var(--accent);border-color:var(--accent);color:white;box-shadow:0 0 12px rgba(230,59,46,0.4)}
.cardio-block{margin:16px 16px 0;background:linear-gradient(135deg,#1a1208 0%,#1c1410 100%);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius);padding:14px 16px}
.cardio-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--gold);line-height:1}
.cardio-protocol{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.cardio-protocol span{color:var(--text);font-weight:500}
.btn-timer{width:100%;padding:10px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);border-radius:8px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s}
.btn-timer.running{background:rgba(230,59,46,0.2);border-color:var(--accent);color:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,59,46,0.3)}50%{box-shadow:0 0 0 6px rgba(230,59,46,0)}}
.exercises-container{padding:12px 16px}
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color 0.2s}
.exercise-card.completed{border-color:rgba(76,175,80,0.4)}
.exercise-header{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:12px}
.ex-number{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);min-width:24px;line-height:1}
.ex-info{flex:1}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.5px;color:var(--text);line-height:1.2}
.ex-target{font-size:12px;color:var(--muted);margin-top:2px}
.ex-target span{color:var(--accent2);font-weight:600}
.ex-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;transition:all 0.2s;cursor:pointer;flex-shrink:0}
.ex-check.done{background:var(--success);border-color:var(--success);color:white}
.sets-container{border-top:1px solid var(--border);padding:0 14px 12px;display:none}
.sets-container.open{display:block}
.ex-illustration{background:#111;border-bottom:1px solid var(--border);padding:14px 12px;display:flex;align-items:flex-start;gap:12px}
.ex-desc{font-size:12px;color:var(--muted);line-height:1.6}
.ex-desc strong{color:var(--accent2);display:block;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;margin-bottom:4px}
.muscles-tag{display:inline-block;margin-top:7px;font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;color:var(--gold);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);padding:2px 8px;border-radius:10px}
.illus-toggle{display:block;width:calc(100% - 28px);margin:8px 14px 0;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:20px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;padding:5px 0;cursor:pointer;text-align:center}
.sets-header{display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:8px;padding:8px 0 6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.set-row{display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:8px;margin-bottom:6px;align-items:center}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--muted);text-align:center}
.set-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;font-weight:500;text-align:center;width:100%;-webkit-appearance:none}
.set-input:focus{outline:none;border-color:var(--accent);background:#1f1410}
.set-input::placeholder{color:var(--muted);font-size:13px}
.set-done-btn{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.set-done-btn.done{background:rgba(76,175,80,0.15);border-color:var(--success);color:var(--success)}
.rest-hint{font-size:11px;color:var(--muted);text-align:center;padding:6px 0 2px;letter-spacing:1px}
.rest-timer-bar{display:flex;align-items:center;gap:10px;background:rgba(230,59,46,0.08);border:1px solid rgba(230,59,46,0.25);border-radius:8px;padding:10px 14px;margin:6px 0}
.rest-timer-bar.done{background:rgba(76,175,80,0.1);border-color:rgba(76,175,80,0.4)}
.rest-count{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);min-width:44px;line-height:1}
.rest-count.done{color:var(--success)}
.rest-progress{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.rest-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.9s linear}
.rest-fill.done{background:var(--success)}
.rest-btns{display:flex;gap:6px}
.rest-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:5px 9px;cursor:pointer;white-space:nowrap}
.rest-btn.primary{background:rgba(230,59,46,0.15);border-color:var(--accent);color:var(--accent)}
.rest-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);min-width:60px}
.prev-badge{font-size:10px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-align:center;padding:3px 0 6px;opacity:0.8}
.week-nav{display:flex;align-items:center;gap:10px;padding:12px 16px 0}
.week-nav button{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-label{flex:1;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;color:var(--text);text-transform:uppercase}
.progress-wrap{padding:10px 16px 0}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s ease}
.progress-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:5px;font-family:'Barlow Condensed',sans-serif}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(0deg,#0f0f0f 60%,transparent);padding:12px 16px 28px;display:flex;gap:10px}
.btn-save{flex:1;padding:14px;background:var(--accent);border:none;border-radius:10px;color:white;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;box-shadow:0 4px 20px rgba(230,59,46,0.4);transition:all 0.2s}
.btn-save:active{transform:scale(0.97)}
.btn-history{padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:20px;cursor:pointer}
.history-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;backdrop-filter:blur(4px)}
.history-panel.open{display:flex;align-items:flex-end}
.history-sheet{background:#111;border-top:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:75vh;overflow-y:auto;padding:20px 16px 40px}
.history-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--accent);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.close-btn{font-size:20px;color:var(--muted);cursor:pointer}
.history-entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.history-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;text-transform:uppercase}
.history-row{font-size:13px;color:var(--muted);margin-bottom:4px;line-height:1.4}
.history-row strong{color:var(--text)}
.empty-history{text-align:center;color:var(--muted);font-size:14px;padding:30px 0}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--success);color:white;padding:10px 20px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="app-title">FURIES GYM</div>
    <div class="week-badge" id="weekBadge">SEMAINE 1</div>
  </div>
  <div class="session-tabs">
    <div class="tab active" onclick="setSession('A')">SÉANCE A</div>
    <div class="tab" onclick="setSession('B')">SÉANCE B</div>
    <div class="tab" onclick="setSession('C')">SÉANCE C</div>
  </div>
</header>
<div class="week-nav">
  <button onclick="changeWeek(-1)">&#8249;</button>
  <div class="week-label" id="weekLabel">Semaine 1</div>
  <button onclick="changeWeek(1)">&#8250;</button>
</div>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0 séries complétées</div>
</div>
<div class="cardio-block">
  <div class="cardio-header">
    <div class="section-label">🔥 Cardio fractionné</div>
    <div class="timer-display" id="timerDisplay">20:00</div>
  </div>
  <div class="cardio-protocol">
    <span>5 min</span> échauffement marche (5–6 km/h) → <span>10 x</span> [30s sprint 9–11 km/h / 1min récup] → <span>2 min</span> retour au calme
  </div>
  <button class="btn-timer" id="timerBtn" onclick="toggleTimer()">▶ DÉMARRER</button>
</div>
<div class="exercises-container" id="exercisesContainer"></div>
<div class="bottom-bar">
  <button class="btn-history" onclick="openHistory()">📋</button>
  <button class="btn-save" onclick="saveSession()">SAUVEGARDER</button>
</div>
<div class="history-panel" id="historyPanel">
  <div class="history-sheet">
    <div class="history-title">HISTORIQUE <span class="close-btn" onclick="closeHistory()">✕</span></div>
    <div id="historyContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── ILLUSTRATIONS ───────────────────────────────────────────────────────────

  "Squat gobelet":{svg:'<svg width="80" height="90" viewBox="0 0 90 100" fill="none"><circle cx="45" cy="10" r="7" fill="#c9a84c"/><line x1="45" y1="17" x2="45" y2="42" stroke="#f0ece4" stroke-width="3.5" stroke-linecap="round"/><rect x="36" y="30" width="18" height="6" rx="3" fill="#e63b2e"/><rect x="33" y="29" width="4" height="8" rx="2" fill="#ff6b35"/><rect x="53" y="29" width="4" height="8" rx="2" fill="#ff6b35"/><line x1="38" y1="42" x2="52" y2="42" stroke="#f0ece4" stroke-width="3" stroke-linecap="round"/><line x1="40" y1="42" x2="22" y2="68" stroke="#f0ece4" stroke-width="4" stroke-linecap="round"/><line x1="22" y1="68" x2="18" y2="90" stroke="#f0ece4" stroke-width="3.5" stroke-linecap="round"/><line x1="50" y1="42" x2="68" y2="68" stroke="#f0ece4" stroke-width="4" stroke-linecap="round"/><line x1="68" y1="68" x2="72" y2="90" stroke="#f0ece4" stroke-width="3.5" stroke-linecap="round"/></svg>',desc:"Pieds largeur épaules, orteils ouverts. Haltère à deux mains contre la poitrine. Descends dos droit, genoux dans l'axe. Remonte en poussant dans les talons.",muscles:"Quadriceps · Fessiers · Ischio-jambiers"},
  "Presse à cuisses":{svg:'<svg width="80" height="90" viewBox="0 0 90 100" fill="none"><rect x="5" y="52" width="50" height="9" rx="3" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1.5"/><rect x="52" y="8" width="8" height="46" rx="2" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1.5"/><circle cx="12" cy="44" r="6" fill="#c9a84c"/><line x1="18" y1="44" x2="50" y2="52" stroke="#f0ece4" stroke-width="3.5" stroke-linecap="round"/><line x1="50" y1="50" x2="57" y2="26" stroke="#f0ece4" stroke-width="4.5" stroke-linecap="round"/><line x1="54" y1="53" x2="64" y2="29" stroke="#f0ece4" stroke-width="4.5" stroke-linecap="round"/></svg>',desc:"Assieds-toi, dos bien calé. Pieds à plat sur la plateforme. Pousse jusqu'à presque tendre les jambes. Reviens lentement sans décoller le dos.",muscles:"Quadriceps · Fessiers · Ischio-jambiers"},
  "Fentes marchées":{svg:'<svg width="80" height="90" viewBox="0 0 90 100" fill="none"><circle cx="45" cy="9" r="7" fill="#c9a84c"/><line x1="45" y1="16" x2="45" y2="42" stroke="#f0ece4" stroke-width="3.5" stroke-linecap="round"/><rect x="20" y="32" width="12" height="5" rx="2.5" fill="#e63b2e"/><rect x="58" y="32" width="12" height="5" rx="2.5" fill="#e63b2e"/><line x1="40" y1="42" x2="28" y2="65" stroke="#f0ece4" stroke-width="4.5" stroke-linecap="round"/><line x1="28" y1="65" x2="28" y2="90" stroke="#f0ece4" stroke-width="4" stroke-linecap="round"/><line x1="18" y1="92" x2="36" y2="92" stroke="#f0ece4" stroke-width="3.5" stroke-linecap="round"/><line x1="50" y1="42" x2="64" y2="68" stroke="#f0ece4" stroke-width="4.5" stroke-linecap="round"/><line x1="64" y1="68" x2="72" y2="58" stroke="#f0ece4" stroke-width="4" stroke-linecap="round"/></svg>',desc:"Debout, haltères dans chaque main. Avance une jambe en grand pas. Descends le genou arrière vers le sol. Genou avant au-dessus de la cheville. Alterne.",muscles:"Quadriceps · Fessiers · Équilibre"},
  "Hip thrust":{svg:'<svg width="80" height="90" viewBox="0 0 90 100" fill="none"><rect x="5" y="52" width="35" height="10" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1.5"/><circle cx="22" cy="48" r="7" fill="#c9a84c"/><line x1="22" y1="55" x2="40" y2="57" stroke="#f0ece4" stroke-width="4" stroke-linecap="round"/><line x1="40" y1="57" x2="48" y2="44" stroke="#f0ece4" stroke-width="4" stroke-linecap="round"/><rect x="30" y="39" width="40" height="6" rx="3" fill="#c9a84c" opacity="0.9"/><line x1="52" y1="45" x2="68" y2="70" stroke="#f0ece4" stroke-width="4.5" stroke-linecap="round"/><line x1="68" y1="70" x2="68" y2="92" stroke="#f0ece4" stroke-width="4" stroke-linecap="round"/><line x1="48" y1="45" x2="34" y2="72" stroke="#f0ece4" stroke-width="4.5" stroke-linecap="round"/><line x1="34" y1="72" x2="34" y2="92" stroke="#f0ece4" stroke-width="4" stroke-linecap="round"/></svg>',desc:"Dos sur un banc (hauteur omoplates), pieds à plat. Barre sur les hanches. Pousse les hanches vers le plafond en contractant les fessiers. 1 sec en haut.",muscles:"Grand fessier · Ischio-jambiers"},

// ─── REST TIMER STATE ─────────────────────────────────────────────────────────
const REST_DEFAULT = 60;
let restTimers = {}; // key: "ei_s" → {sec, interval, total}

function startRest(ei, s) {
  const k = `${ei}_${s}`;
  stopRest(k);
  restTimers[k] = { sec: REST_DEFAULT, total: REST_DEFAULT, interval: null };
  restTimers[k].interval = setInterval(() => {
    restTimers[k].sec--;
    renderRestBar(ei, s);
    if (restTimers[k].sec <= 0) {
      stopRest(k);
      renderRestBar(ei, s);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
  renderRestBar(ei, s);
}

function stopRest(k) {
  if (restTimers[k] && restTimers[k].interval) {
    clearInterval(restTimers[k].interval);
    restTimers[k].interval = null;
  }
}

function resetRest(ei, s) {
  const k = `${ei}_${s}`;
  stopRest(k);
  delete restTimers[k];
  renderRestBar(ei, s);
}

function addRest(ei, s, delta) {
  const k = `${ei}_${s}`;
  if (!restTimers[k]) return;
  restTimers[k].sec = Math.max(0, restTimers[k].sec + delta);
  restTimers[k].total = Math.max(restTimers[k].total, restTimers[k].sec);
  renderRestBar(ei, s);
}

function renderRestBar(ei, s) {
  const bar = document.getElementById(`rest-${ei}-${s}`);
  if (!bar) return;
  const k = `${ei}_${s}`;
  const rt = restTimers[k];
  if (!rt) {
    bar.style.display = 'none';
    return;
  }
  const done = rt.sec <= 0;
  const pct = done ? 100 : Math.round((1 - rt.sec / rt.total) * 100);
  bar.style.display = 'flex';
  bar.className = 'rest-timer-bar' + (done ? ' done' : '');
  bar.innerHTML = `
    <div class="rest-count${done?' done':''}">${done?'GO':fmt(rt.sec)}</div>
    <div class="rest-progress"><div class="rest-fill${done?' done':''}" style="width:${pct}%"></div></div>
    <div class="rest-btns">
      ${!done ? `<button class="rest-btn" onclick="addRest(${ei},${s},-15)">-15s</button>
      <button class="rest-btn" onclick="addRest(${ei},${s},15)">+15s</button>` : ''}
      <button class="rest-btn${done?'':' primary'}" onclick="${done?`resetRest(${ei},${s})`:`startRest(${ei},${s})`}">${done?'↺':'⏸'}</button>
    </div>`;
}

function fmt(sec) {
  const m = Math.floor(sec/60).toString().padStart(2,'0');
  const s = (sec%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let cur, week, tInt=null, tSec=1200, tRun=false, sd={};

function loadPrefs(){
  try {
    const p = JSON.parse(localStorage.getItem('fg_prefs')||'{}');
    cur  = p.session || 'A';
    week = p.week    || getCurrentWeek();
  } catch(e){ cur='A'; week=1; }
}
function savePrefs(){
  localStorage.setItem('fg_prefs', JSON.stringify({session:cur, week:week}));
}
function getCurrentWeek(){
  // Semaine courante dans le cycle 12 semaines depuis une date de départ
  try {
    const start = localStorage.getItem('fg_start');
    if(!start) { localStorage.setItem('fg_start', Date.now()); return 1; }
    const elapsed = Math.floor((Date.now() - parseInt(start)) / (7*24*3600*1000));
    return Math.max(1, Math.min(12, elapsed + 1));
  } catch(e){ return 1; }
}

function gk(w,s){ return `fg_w${w}_${s}`; }
function ld(){ try{ return JSON.parse(localStorage.getItem(gk(week,cur))||'{}') }catch(e){ return {}; } }
function sv(){ localStorage.setItem(gk(week,cur), JSON.stringify(sd)); }

// Récupère les valeurs de la semaine précédente pour un exercice donné
function getPrevValues(ei, sets){
  if(week <= 1) return null;
  try {
    const prev = JSON.parse(localStorage.getItem(gk(week-1, cur))||'{}');
    const vals = [];
    let hasData = false;
    for(let s=0; s<sets; s++){
      const d = prev[`${ei}_${s}`]||{};
      vals.push({weight: d.weight||'', reps: d.reps||''});
      if(d.weight || d.reps) hasData = true;
    }
    return hasData ? vals : null;
  } catch(e){ return null; }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function setSession(s){
  cur=s;
  savePrefs();
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['A','B','C'][i]===s));
  resetTimer(); render();
}
function changeWeek(d){
  week=Math.max(1,Math.min(12,week+d));
  document.getElementById('weekLabel').textContent=`Semaine ${week}`;
  document.getElementById('weekBadge').textContent=`SEMAINE ${week}`;
  savePrefs();
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  sd=ld();
  document.getElementById('weekLabel').textContent=`Semaine ${week}`;
  document.getElementById('weekBadge').textContent=`SEMAINE ${week}`;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['A','B','C'][i]===cur));

  const cont=document.getElementById('exercisesContainer'); cont.innerHTML='';
  SESSIONS[cur].exercises.forEach((ex,ei)=>{
    const done=isDone(ei,ex.sets);
    const il=IL[ex.name];
    const prev=getPrevValues(ei,ex.sets);
    const card=document.createElement('div');
    card.className='exercise-card'+(done?' completed':'');
    card.id=`ex-${ei}`;

    let prevHint = '';
    if(prev && week > 1){
      const summary = prev.map((v,i)=>`S${i+1}: ${v.weight?v.weight+'kg':'?'} × ${v.reps||'?'}`).join(' · ');
      prevHint = `<div class="prev-badge">📈 Sem. ${week-1} : ${summary}</div>`;
    }

    card.innerHTML=`
      <div class="exercise-header" onclick="togSets(${ei})">
        <div class="ex-number">${ei+1}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-target">${ex.target} — <span>${ex.charge}</span></div>
        </div>
        <div class="ex-check${done?' done':''}" id="chk-${ei}" onclick="event.stopPropagation();markAll(${ei},${ex.sets})">${done?'✓':''}</div>
      </div>
      <div class="sets-container" id="sc-${ei}">
        ${il?`<button class="illus-toggle" id="ib-${ei}" onclick="togIl(${ei})">👁 VOIR LE MOUVEMENT</button>
        <div class="ex-illustration" id="il-${ei}" style="display:none">${il.svg}<div class="ex-desc"><strong>COMMENT FAIRE</strong>${il.desc}<br><span class="muscles-tag">${il.muscles}</span></div></div>`:''}
        <div class="sets-header"><div>SÉRIE</div><div>POIDS (kg)</div><div>REPS</div><div></div></div>
        ${buildRows(ei,ex.sets,prev)}
        ${prevHint}
        <div class="rest-hint">⏱ Coche une série pour lancer le minuteur de récupération</div>
      </div>`;
    cont.appendChild(card);
  });
  prog();
}

function buildRows(ei,n,prev){
  let h='';
  for(let s=0;s<n;s++){
    const d=sd[`${ei}_${s}`]||{};
    // Pré-remplir avec valeurs semaine précédente si champ vide
    const w = d.weight!==undefined ? d.weight : (prev&&prev[s]?prev[s].weight:'');
    const r = d.reps!==undefined   ? d.reps   : (prev&&prev[s]?prev[s].reps:'');
    h+=`<div class="set-row">
      <div class="set-num">${s+1}</div>
      <input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${w}" onchange="sf(${ei},${s},'weight',this.value)">
      <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${r}" onchange="sf(${ei},${s},'reps',this.value)">
      <button class="set-done-btn${d.done?' done':''}" id="sb-${ei}-${s}" onclick="tsd(${ei},${s})">${d.done?'✓':'○'}</button>
    </div>
    <div id="rest-${ei}-${s}" style="display:none"></div>`;
  }
  return h;
}

function togSets(ei){ document.getElementById(`sc-${ei}`).classList.toggle('open'); }
function togIl(ei){
  const el=document.getElementById(`il-${ei}`);
  const btn=document.getElementById(`ib-${ei}`);
  const show=el.style.display==='none';
  el.style.display=show?'flex':'none';
  btn.textContent=show?'✕ MASQUER':'👁 VOIR LE MOUVEMENT';
}

function sf(ei,s,f,v){
  const k=`${ei}_${s}`; if(!sd[k])sd[k]={};
  sd[k][f]=v; sv();
}
function tsd(ei,s){
  const k=`${ei}_${s}`; if(!sd[k])sd[k]={};
  sd[k].done=!sd[k].done; sv();
  const btn=document.getElementById(`sb-${ei}-${s}`);
  btn.classList.toggle('done',sd[k].done); btn.textContent=sd[k].done?'✓':'○';
  // Lance le minuteur de récupération quand on valide une série
  if(sd[k].done) startRest(ei, s);
  else resetRest(ei, s);
  const ex=SESSIONS[cur].exercises[ei];
  const all=isDone(ei,ex.sets);
  document.getElementById(`ex-${ei}`).classList.toggle('completed',all);
  const ch=document.getElementById(`chk-${ei}`);
  ch.classList.toggle('done',all); ch.textContent=all?'✓':'';
  prog();
}
function markAll(ei,n){
  const was=(sd[`${ei}_0`]||{}).done;
  for(let s=0;s<n;s++){
    const k=`${ei}_${s}`; if(!sd[k])sd[k]={};
    sd[k].done=!was;
    const b=document.getElementById(`sb-${ei}-${s}`);
    if(b){b.classList.toggle('done',!was);b.textContent=!was?'✓':'○';}
  }
  sv();
  document.getElementById(`ex-${ei}`).classList.toggle('completed',!was);
  const ch=document.getElementById(`chk-${ei}`); ch.classList.toggle('done',!was); ch.textContent=!was?'✓':'';
  prog();
}
function isDone(ei,n){ for(let s=0;s<n;s++){if(!(sd[`${ei}_${s}`]||{}).done)return false;} return n>0; }

function prog(){
  const ses=SESSIONS[cur]; let tot=0,dn=0;
  ses.exercises.forEach((ex,ei)=>{ tot+=ex.sets; for(let s=0;s<ex.sets;s++){if((sd[`${ei}_${s}`]||{}).done)dn++;} });
  document.getElementById('progressFill').style.width=(tot?Math.round(dn/tot*100):0)+'%';
  document.getElementById('progressLabel').textContent=`${dn} / ${tot} séries complétées`;
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function toggleTimer(){
  if(!tRun){
    tRun=true; document.getElementById('timerBtn').textContent='⏸ PAUSE'; document.getElementById('timerBtn').classList.add('running');
    tInt=setInterval(()=>{ if(tSec>0){tSec--;updT();}else{clearInterval(tInt);tRun=false;document.getElementById('timerBtn').textContent='✓ TERMINÉ';document.getElementById('timerBtn').classList.remove('running');} },1000);
  }else{ clearInterval(tInt);tRun=false;document.getElementById('timerBtn').textContent='▶ REPRENDRE';document.getElementById('timerBtn').classList.remove('running'); }
}
function resetTimer(){ clearInterval(tInt);tRun=false;tSec=1200;updT();const b=document.getElementById('timerBtn');b.textContent='▶ DÉMARRER';b.classList.remove('running'); }
function updT(){ const m=Math.floor(tSec/60).toString().padStart(2,'0');const s=(tSec%60).toString().padStart(2,'0');document.getElementById('timerDisplay').textContent=`${m}:${s}`; }

// ─── SAVE / HISTORY ───────────────────────────────────────────────────────────
function saveSession(){
  const d=new Date(),ds=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  let h=[]; try{h=JSON.parse(localStorage.getItem('fg_history')||'[]');}catch(e){}
  const entries=[];
  SESSIONS[cur].exercises.forEach((ex,ei)=>{
    const sets=[];
    for(let s=0;s<ex.sets;s++){const d=sd[`${ei}_${s}`]||{};if(d.weight||d.reps)sets.push(`${d.weight||'?'}kg×${d.reps||'?'}`);}
    if(sets.length)entries.push({name:ex.name,sets});
  });
  h.unshift({date:ds,session:cur,week,data:entries});
  localStorage.setItem('fg_history',JSON.stringify(h.slice(0,50)));
  showToast('✓ SÉANCE SAUVEGARDÉE');
}
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500); }
function openHistory(){
  let h=[]; try{h=JSON.parse(localStorage.getItem('fg_history')||'[]');}catch(e){}
  document.getElementById('historyContent').innerHTML=h.length
    ? h.map(e=>`<div class="history-entry"><div class="history-date">Séance ${e.session} — Sem. ${e.week} — ${e.date}</div>${e.data.map(x=>`<div class="history-row"><strong>${x.name}</strong> : ${x.sets.join(' | ')}</div>`).join('')}</div>`).join('')
    : '<div class="empty-history">Aucune séance enregistrée encore.</div>';
  document.getElementById('historyPanel').classList.add('open');
}
function closeHistory(){ document.getElementById('historyPanel').classList.remove('open'); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadPrefs();
render();
</script>
